<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ArtChain Gallery — Login</title>

  <style>
    :root{
      --bg1:#eaf6ff; --bg2:#dff1ff; --card:#fff;
      --text:#16324f; --muted:#5b6b7a;
      --primary:#7bb9ff; --primary2:#9fd0ff; --border:#d6e7f7;
      --ok:#2eae7b; --bad:#e95a5a;
      --shadow: 0 12px 34px rgba(16, 80, 140, 0.14);
      --radius: 16px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial;
      min-height:100vh;
      padding:22px;
      color:var(--text);
      background: radial-gradient(1200px 600px at 10% 0%, var(--bg1), transparent 60%),
                  radial-gradient(900px 500px at 90% 10%, var(--bg2), transparent 55%),
                  linear-gradient(135deg, #f4fbff 0%, #e6f4ff 100%);
      display:flex; align-items:center; justify-content:center;
    }
    .wrap{width:100%; max-width:980px; display:grid; grid-template-columns:1.1fr 1fr; gap:16px;}
    @media(max-width:900px){ .wrap{grid-template-columns:1fr;} }
    .card{
      background: rgba(255,255,255,0.95);
      border:1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding:22px;
    }
    h1{font-size:1.9em; margin-bottom:6px}
    .sub{color:var(--muted); margin-bottom:14px; line-height:1.35}
    .pill{
      display:inline-flex; gap:8px; align-items:center;
      padding:8px 12px; border-radius:999px;
      border:1px solid var(--border);
      background: rgba(234,246,255,0.7);
      color:var(--muted); font-size:.9em;
      margin-bottom:12px;
    }
    .dot{width:10px;height:10px;border-radius:50%;background:var(--ok); box-shadow:0 0 0 4px rgba(46,174,123,.15)}
    label{display:block; font-weight:700; margin:10px 0 6px}
    input{
      width:100%;
      padding:12px;
      border:1.5px solid var(--border);
      border-radius:12px;
      font-size:1em;
    }
    input:focus{outline:none; box-shadow:0 0 0 4px rgba(77,157,242,0.12); border-color:rgba(77,157,242,0.65);}
    .row{display:flex; gap:10px; flex-wrap:wrap; margin-top:14px}
    .btn{
      border:none; cursor:pointer;
      padding:12px 16px; border-radius:12px; font-weight:750;
      background: linear-gradient(135deg, var(--primary), var(--primary2));
      color:#0b2a45;
    }
    .btn.secondary{
      background:#fff; border:1px solid var(--border); color:var(--text);
    }
    .msg{
      margin-top:12px; padding:12px 14px; border-radius:14px;
      border:1px solid var(--border); background:#fff;
    }
    .msg.ok{border-color: rgba(46,174,123,0.35)}
    .msg.err{border-color: rgba(233,90,90,0.35)}
    .help{color:var(--muted); font-size:.9em; margin-top:10px; line-height:1.35}
    .small{color:var(--muted); font-size:.85em; margin-top:6px}
    a{color:#2b6cb0; text-decoration:none; font-weight:700}
    a:hover{text-decoration:underline}
  </style>
</head>

<body>
  <div class="wrap">
    <!-- Left: info -->
    <div class="card">
      <h1>🎨 ArtChain Gallery</h1>

      <div id="sessionBox" style="display:none;">
        <div class="pill"><span class="dot"></span><span>Logged in as <b id="who"></b></span></div>
        <div class="row">
          <button class="btn" id="goBtn">Go to Marketplace →</button>
          <button class="btn secondary" id="logoutBtn">Logout</button>
        </div>
      </div>
    </div>

    <!-- Right: forms -->
    <div class="card" id="formsBox">
      <div class="pill"><span style="font-weight:800;">Account</span></div>

      <form id="registerForm">
        <h3 style="margin-top:6px;">Register</h3>
        <label>Email</label>
        <input id="regEmail" type="email" placeholder="email@example.com" required />
        <label>Password</label>
        <input id="regPass" type="password" minlength="4" placeholder="min 4 chars" required />
        <div class="row">
          <button class="btn" type="submit">Create account</button>
        </div>
        <div class="small">For demo. Not secure storage.</div>
      </form>

      <hr style="border:none;border-top:1px solid var(--border); margin:16px 0;">

      <form id="loginForm">
        <h3>Login</h3>
        <label>Email</label>
        <input id="logEmail" type="email" placeholder="email@example.com" required />
        <label>Password</label>
        <input id="logPass" type="password" placeholder="your password" required />
        <div class="row">
          <button class="btn secondary" type="submit">Login</button>
        </div>
      </form>

      <div id="msgBox"></div>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
