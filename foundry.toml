[profile.default]
src = "contracts"
test = "test"
script = "script"
out = "out"
libs = ["node_modules", "lib"]
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = true
fs_permissions = [
  { access = "read-write", path = "./deployments" },
  { access = "read", path = "./" }
]

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true

[profile.ci]
verbosity = 3
